<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Club PlayKids - Cajera</title>

<style>
body{
  font-family:Arial,sans-serif;
  background:#eef7ff;
  padding:20px;
}

.card{
  max-width:500px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:20px;
  box-shadow:0 5px 15px rgba(0,0,0,.1);
}

input{
  width:100%;
  padding:15px;
  font-size:18px;
  border-radius:10px;
  border:1px solid #ccc;
  margin-bottom:15px;
}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  font-size:18px;
  cursor:pointer;
  margin-top:10px;
}

.buscar{
  background:#1e88e5;
  color:white;
}

.registrar{
  background:#16a34a;
  color:white;
}

.resultado{
  margin-top:20px;
}
</style>
</head>

<body>

<div class="card">

<h2>👑 Panel Cajera</h2>

<input
id="idSocio"
placeholder="PK001"
/>

<button
class="buscar"
onclick="buscarSocio()">
Buscar socio
</button>

<div
id="resultado"
class="resultado">
</div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbw3xN290pHD_AT9Urpy3DxUiicKgqsBRK3_pk0kj_3HhKwogrHf3N_CIlB4dJDAXq3F/exec";

function mostrarSocio(data){

const div =
document.getElementById("resultado");

if(data.error){

div.innerHTML =
"Socio no encontrado";

return;

}

div.innerHTML = `
<h3>${data.nombre}</h3>

<p><b>ID:</b> ${data.id}</p>

<p><b>Visitas:</b> ${data.visitas}</p>

<p><b>Premio:</b> ${data.premio}</p>

<button
class="registrar"
onclick="registrarVisita('${data.id}')">
Registrar visita
</button>
`;

}

function buscarSocio(){

const id =
document.getElementById("idSocio").value;

const script =
document.createElement("script");

script.src =
`${API_URL}?id=${id}&callback=mostrarSocio`;

document.body.appendChild(script);

}

function registrarVisita(id){

document.getElementById("resultado").innerHTML =
"Registrando visita...";

const script =
document.createElement("script");

script.src =
`${API_URL}?id=${id}&action=visita&callback=mostrarSocio&t=${Date.now()}`;

document.body.appendChild(script);

}

</script>

</body>
</html>
